{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-8">
    <div class="task-card p-4">
      <h3 class="fw-bold mb-3">הגדרות מערכת</h3>
      <form method="post" class="row g-3">
        <div class="col-md-6"><label class="form-label">שם המערכת</label><input class="form-control" name="company_name" value="{{ settings.company_name }}"></div>
        <div class="col-md-6"><label class="form-label">מייל המעסיק לקבלת סיכומים</label><input class="form-control" name="employer_email" value="{{ settings.employer_email }}"></div>
        <div class="col-md-4"><label class="form-label">SMTP Host</label><input class="form-control" name="smtp_host" value="{{ settings.smtp_host }}"></div>
        <div class="col-md-2"><label class="form-label">Port</label><input class="form-control" name="smtp_port" value="{{ settings.smtp_port }}"></div>
        <div class="col-md-3"><label class="form-label">SMTP Username</label><input class="form-control" name="smtp_username" value="{{ settings.smtp_username }}"></div>
        <div class="col-md-3"><label class="form-label">SMTP Password</label><input type="password" class="form-control" name="smtp_password" value="{{ settings.smtp_password }}"></div>
        <div class="col-md-4"><label class="form-label">כתובת שולח</label><input class="form-control" name="smtp_sender" value="{{ settings.smtp_sender }}"></div>
        <div class="col-md-4"><label class="form-label">צבע ראשי</label><input type="color" class="form-control form-control-color" name="primary_color" value="{{ settings.primary_color }}"></div>
        <div class="col-md-4"><label class="form-label">צבע רקע משני</label><input type="color" class="form-control form-control-color" name="secondary_color" value="{{ settings.secondary_color }}"></div>
        <div class="col-md-4"><label class="form-label">צבע הדגשה</label><input type="color" class="form-control form-control-color" name="accent_color" value="{{ settings.accent_color }}"></div>
        <div class="col-md-4"><label class="form-label">צבע כרטיסים</label><input type="color" class="form-control form-control-color" name="card_color" value="{{ settings.card_color }}"></div>
        <div class="col-md-4"><label class="form-label">צבע טקסט</label><input type="color" class="form-control form-control-color" name="text_color" value="{{ settings.text_color }}"></div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary">שמור הגדרות</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('export_settings') }}">הורדת גיבוי הגדרות</a>
        </div>
      </form>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="glass p-4 mb-4">
      <h5 class="fw-bold">ייבוא הגדרות</h5>
      <form method="post" action="{{ url_for('import_settings') }}" enctype="multipart/form-data">
        <input class="form-control mb-3" type="file" name="settings_file" accept="application/json" required>
        <button class="btn btn-success">ייבא קובץ גיבוי</button>
      </form>
    </div>
    <div class="glass p-4">
      <h5 class="fw-bold">הערות</h5>
      <div class="tiny">
        כדי שכולם ייכנסו דרך האינטרנט ממחשבים שונים, מעלים את הפרויקט לשרת אחד, ואז כל העובדים נכנסים לאותה כתובת אתר.
      </div>
    </div>
  </div>
</div>
{% endblock %}
